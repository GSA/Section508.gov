name: Content Library Validation

on:
  pull_request:
    paths:
      - "_data/content-library-*.yml"
      - "_pages/**"
      - "_posts/**"
      - "scripts/validate-content-library.js"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - ".github/workflows/content-library-validation.yml"
  workflow_dispatch:
    inputs:
      remote_validation:
        description: "Check asset-hosted files on assets.section508.gov"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    name: Validate content library
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content library
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.remote_validation }}
        run: npm run validate:library:offline

      - name: Validate content library with remote asset checks
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.remote_validation }}
        run: npm run validate:library
